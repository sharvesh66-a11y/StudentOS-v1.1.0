<svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <!-- Purple to Blue gradient -->
    <linearGradient id="sos-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="sos-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded square background with gradient -->
  <rect x="4" y="4" width="56" height="56" rx="14" fill="url(#sos-grad)" filter="url(#sos-glow)"/>

  <!-- Stylized "S" formed by two overlapping arcs (AI neural-network vibe) -->
  <g filter="url(#sos-glow)">
    <!-- Top arc -->
    <path d="M 44 22 A 12 12 0 0 0 32 20 A 10 10 0 0 0 22 28" stroke="white" stroke-width="3.5" stroke-linecap="round" fill="none" opacity="0.95"/>
    <!-- Bottom arc -->
    <path d="M 20 42 A 12 12 0 0 0 32 44 A 10 10 0 0 0 42 36" stroke="white" stroke-width="3.5" stroke-linecap="round" fill="none" opacity="0.95"/>
    <!-- Center connection node (AI core) -->
    <circle cx="32" cy="32" r="4" fill="white"/>
    <!-- Side nodes (neural network) -->
    <circle cx="22" cy="28" r="2" fill="white" opacity="0.7"/>
    <circle cx="42" cy="36" r="2" fill="white" opacity="0.7"/>
    <!-- Connection lines -->
    <line x1="22" y1="28" x2="32" y2="32" stroke="white" stroke-width="1" opacity="0.4"/>
    <line x1="42" y1="36" x2="32" y2="32" stroke="white" stroke-width="1" opacity="0.4"/>
  </g>
</svg>
